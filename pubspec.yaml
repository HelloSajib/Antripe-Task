name: flutter_task
description: "A new Flutter project."

publish_to: 'none'

# The version of the application.
version: 1.0.0+1

environment:
  sdk: ^3.10.4

# Application dependencies.
dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # UI & Animations
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  scrollable_positioned_list: ^0.3.8
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.3
  toastification: ^3.0.3
  gap: ^3.0.1

  # State Management & Utilities
  flutter_bloc: ^9.1.1
  flutter_hooks: ^0.21.3+1
  get_it: ^9.2.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  logger: ^2.6.2

  # Helpers & Services
  intl_phone_number_input: ^0.7.5
  dropdown_textfield: ^1.2.0

  # Navigation
  go_router: ^17.1.0

  # Networking & Storage
  dio: ^5.9.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3

dependency_overrides:
  intl: ^0.20.2

# Dependencies for development and testing.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


# Flutter-specific configuration.
flutter:
  uses-material-design: true

  # Asset declarations.
  assets:
    - assets/icons/
    - assets/images/
    - assets/dummy/